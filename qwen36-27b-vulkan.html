<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON SNAKE</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #0a0a0f;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  color: #e0e0ff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

/* ===== ANIMATED BACKGROUND ===== */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(0,255,200,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(255,0,200,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 20%, rgba(0,150,255,0.03) 0%, transparent 50%);
  animation: bgPulse 8s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}
@keyframes bgPulse {
  0% { opacity: 0.6; }
  100% { opacity: 1; }
}

/* ===== LAYOUT ===== */
#game-wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
#hud {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 560px;
  padding: 0 8px;
  font-size: 14px;
  letter-spacing: 0.5px;
}
.hud-item { display: flex; align-items: center; gap: 6px; }
.hud-label { color: #8888aa; text-transform: uppercase; font-size: 11px; }
.hud-value { color: #00ffc8; font-weight: 700; font-variant-numeric: tabular-nums; }
.hud-value.hs { color: #ff00c8; }

/* ===== CANVAS ===== */
#game-canvas {
  border: 2px solid rgba(0,255,200,0.3);
  border-radius: 8px;
  box-shadow: 0 0 30px rgba(0,255,200,0.15), 0 0 60px rgba(0,150,255,0.08), inset 0 0 30px rgba(0,0,0,0.5);
  background: #06060c;
  image-rendering: pixelated;
  max-width: 96vw;
  max-height: 60vh;
}

/* ===== OVERLAYS ===== */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(6,6,12,0.88);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 8px;
  z-index: 10;
  transition: opacity 0.3s ease;
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.overlay h1 {
  font-size: clamp(28px, 6vw, 48px);
  font-weight: 900;
  letter-spacing: 4px;
  background: linear-gradient(135deg, #00ffc8, #00aaff, #ff00c8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleGlow 3s ease-in-out infinite alternate;
  margin-bottom: 24px;
}
@keyframes titleGlow {
  0% { filter: drop-shadow(0 0 10px rgba(0,255,200,0.5)); }
  50% { filter: drop-shadow(0 0 20px rgba(0,170,255,0.6)); }
  100% { filter: drop-shadow(0 0 10px rgba(255,0,200,0.5)); }
}
.overlay h2 {
  font-size: clamp(20px, 4vw, 32px);
  font-weight: 800;
  color: #ff4466;
  text-shadow: 0 0 20px rgba(255,68,102,0.5);
  margin-bottom: 16px;
}
.overlay .stat {
  font-size: 16px;
  color: #aaaacc;
  margin: 4px 0;
}
.overlay .stat span { color: #00ffc8; font-weight: 700; }

/* ===== PANELS ===== */
.panel {
  background: rgba(20,20,35,0.6);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  min-width: 280px;
}
.panel label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #8888aa;
}

/* ===== DIFFICULTY SELECT ===== */
.diff-select { display: flex; gap: 8px; }
.diff-btn {
  padding: 8px 18px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  background: rgba(255,255,255,0.04);
  color: #ccccee;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  outline: none;
}
.diff-btn:hover { background: rgba(0,255,200,0.1); border-color: rgba(0,255,200,0.3); }
.diff-btn:focus-visible { box-shadow: 0 0 0 2px #00ffc8; }
.diff-btn.active {
  background: rgba(0,255,200,0.15);
  border-color: #00ffc8;
  color: #00ffc8;
  box-shadow: 0 0 12px rgba(0,255,200,0.2);
}

/* ===== BUTTONS ===== */
.btn {
  padding: 12px 36px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s ease;
  outline: none;
  text-transform: uppercase;
}
.btn:focus-visible { box-shadow: 0 0 0 3px #00ffc8; }
.btn-primary {
  background: linear-gradient(135deg, #00ffc8, #00aaff);
  color: #0a0a0f;
  box-shadow: 0 4px 20px rgba(0,255,200,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(0,255,200,0.4); }
.btn-secondary {
  background: rgba(255,255,255,0.08);
  color: #ccccee;
  border: 1px solid rgba(255,255,255,0.15);
}
.btn-secondary:hover { background: rgba(255,255,255,0.14); }

/* ===== MUTE TOGGLE ===== */
.mute-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 6px 14px;
  color: #aaa;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  outline: none;
}
.mute-btn:hover { border-color: rgba(255,255,255,0.25); color: #ddd; }
.mute-btn:focus-visible { box-shadow: 0 0 0 2px #00ffc8; }

/* ===== INSTRUCTIONS ===== */
.instructions {
  font-size: 12px;
  color: #666688;
  text-align: center;
  line-height: 1.8;
  max-width: 260px;
}
.kbd {
  display: inline-block;
  padding: 1px 6px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  font-size: 11px;
  font-family: monospace;
  color: #aaa;
  background: rgba(255,255,255,0.04);
}

/* ===== TOUCH D-PAD ===== */
#dpad {
  display: none;
  grid-template-areas:
    ". up ."
    "left . right"
    ". down .";
  grid-template-columns: repeat(3, 56px);
  grid-template-rows: repeat(3, 56px);
  gap: 4px;
  margin-top: 8px;
}
.dpad-btn {
  width: 56px;
  height: 56px;
  border: 1px solid rgba(0,255,200,0.2);
  border-radius: 12px;
  background: rgba(0,255,200,0.06);
  color: #00ffc8;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}
.dpad-btn:active { background: rgba(0,255,200,0.2); transform: scale(0.92); }
.dpad-btn:focus-visible { box-shadow: 0 0 0 2px #00ffc8; }
.dpad-btn[data-dir="up"] { grid-area: up; }
.dpad-btn[data-dir="left"] { grid-area: left; }
.dpad-btn[data-dir="right"] { grid-area: right; }
.dpad-btn[data-dir="down"] { grid-area: down; }

/* ===== PAUSE INDICATOR ===== */
#pause-indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 24px;
  font-weight: 800;
  letter-spacing: 4px;
  color: rgba(0,255,200,0.7);
  text-shadow: 0 0 20px rgba(0,255,200,0.4);
  z-index: 5;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
#pause-indicator.visible { opacity: 1; }

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  #dpad { display: grid; }
  .panel { min-width: 240px; padding: 18px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div id="game-wrapper">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="hud-score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Best</span>
      <span class="hud-value hs" id="hud-hs">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Level</span>
      <span class="hud-value" id="hud-diff">-</span>
    </div>
    <button class="mute-btn" id="mute-btn" aria-label="Toggle sound" title="Mute/Unmute">&#128266;</button>
  </div>

  <!-- Canvas container -->
  <div style="position:relative; display:inline-block;">
    <canvas id="game-canvas" width="560" height="560" role="img" aria-label="Snake game canvas"></canvas>

    <!-- Pause indicator -->
    <div id="pause-indicator">PAUSED</div>

    <!-- Start menu overlay -->
    <div class="overlay" id="start-overlay">
      <div class="panel">
        <h1>NEON SNAKE</h1>
        <label>Difficulty</label>
        <div class="diff-select" role="radiogroup" aria-label="Difficulty selection">
          <button class="diff-btn" data-diff="chill" role="radio" aria-checked="false">Chill</button>
          <button class="diff-btn active" data-diff="classic" role="radio" aria-checked="true">Classic</button>
          <button class="diff-btn" data-diff="insane" role="radio" aria-checked="false">Insane</button>
        </div>
        <button class="btn btn-primary" id="start-btn">Start Game</button>
        <div class="instructions">
          <span class="kbd">&#8593;</span><span class="kbd">&#8595;</span><span class="kbd">&#8592;</span><span class="kbd">&#8594;</span> or <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span> to move<br>
          <span class="kbd">ESC</span> / <span class="kbd">Space</span> to pause<br>
          Swipe or use D-pad on mobile
        </div>
      </div>
    </div>

    <!-- Game over overlay -->
    <div class="overlay hidden" id="gameover-overlay">
      <div class="panel">
        <h2>GAME OVER</h2>
        <div class="stat">Score: <span id="go-score">0</span></div>
        <div class="stat">Best: <span id="go-hs">0</span></div>
        <div class="stat">Difficulty: <span id="go-diff">Classic</span></div>
        <button class="btn btn-primary" id="restart-btn">Play Again</button>
        <button class="btn btn-secondary" id="menu-btn">Main Menu</button>
      </div>
    </div>
  </div>

  <!-- Touch D-Pad -->
  <div id="dpad">
    <button class="dpad-btn" data-dir="up" aria-label="Move up">&#9650;</button>
    <button class="dpad-btn" data-dir="left" aria-label="Move left">&#9664;</button>
    <button class="dpad-btn" data-dir="right" aria-label="Move right">&#9654;</button>
    <button class="dpad-btn" data-dir="down" aria-label="Move down">&#9660;</button>
  </div>
</div>

<script>
// =============================================================================
// NEON SNAKE - Premium Cyberpunk Snake Game
// =============================================================================

(function() {
  'use strict';

  // ===== CONFIGURATION =====
  var GRID = 28;
  var CELL = 20;
  var DIFFICULTIES = {
    chill:   { speed: 130, wrap: true,  label: 'Chill',   bonus: false },
    classic: { speed: 90,  wrap: false, label: 'Classic', bonus: false },
    insane:  { speed: 55,  wrap: false, label: 'Insane',  bonus: true  },
  };

  // ===== DOM REFERENCES =====
  var canvas          = document.getElementById('game-canvas');
  var ctx             = canvas.getContext('2d');
  var hudScore        = document.getElementById('hud-score');
  var hudHS           = document.getElementById('hud-hs');
  var hudDiff         = document.getElementById('hud-diff');
  var muteBtn         = document.getElementById('mute-btn');
  var startOverlay    = document.getElementById('start-overlay');
  var gameoverOverlay = document.getElementById('gameover-overlay');
  var pauseIndicator  = document.getElementById('pause-indicator');
  var startBtn        = document.getElementById('start-btn');
  var restartBtn      = document.getElementById('restart-btn');
  var menuBtn         = document.getElementById('menu-btn');
  var goScore         = document.getElementById('go-score');
  var goHS            = document.getElementById('go-hs');
  var goDiff          = document.getElementById('go-diff');
  var diffBtns        = document.querySelectorAll('.diff-btn');

  // ===== GAME STATE =====
  var snake;
  var direction;
  var nextDirection;
  var food;
  var bonusFood;
  var score;
  var highScore;
  var difficulty;
  var gameRunning = false;
  var gamePaused = false;
  var lastTick = 0;
  var accumulator = 0;
  var particles = [];
  var gridPhase = 0;
  var muted = false;
  var audioCtx = null;

  // ===== AUDIO ENGINE (Web Audio API) =====
  function initAudio() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) {
        return;
      }
    }
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  /** Play a short synthesized sound effect */
  function playSound(type) {
    if (muted || !audioCtx) return;
    try {
      var now = audioCtx.currentTime;
      var osc  = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'eat') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
      } else if (type === 'bonus') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(1600, now + 0.1);
        gain.gain.setValueAtTime(0.18, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now);
        osc.stop(now + 0.25);
      } else if (type === 'die') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.4);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
      } else if (type === 'move') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, now);
        gain.gain.setValueAtTime(0.03, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
        osc.start(now);
        osc.stop(now + 0.03);
      }
    } catch(e) {
      // Audio not available
    }
  }

  // ===== PARTICLE SYSTEM =====
  /** Spawn particles at a grid position */
  function spawnParticles(gx, gy, color, count) {
    var cx = gx * CELL + CELL / 2;
    var cy = gy * CELL + CELL / 2;
    for (var i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 1 + Math.random() * 3;
      particles.push({
        x: cx,
        y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        size: 2 + Math.random() * 3,
        color: color,
      });
    }
  }

  /** Update and draw all particles */
  function updateParticles() {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // ===== FOOD SPAWNING =====
  /** Get a random grid cell not occupied by the snake */
  function randomFreeCell() {
    var occupied = {};
    for (var i = 0; i < snake.length; i++) {
      occupied[snake[i].x + ',' + snake[i].y] = true;
    }
    var free = [];
    for (var x = 0; x < GRID; x++) {
      for (var y = 0; y < GRID; y++) {
        if (!occupied[x + ',' + y]) {
          free.push({ x: x, y: y });
        }
      }
    }
    return free[Math.floor(Math.random() * free.length)];
  }

  function spawnFood() {
    food = randomFreeCell();
  }

  function spawnBonusFood() {
    var pos = randomFreeCell();
    bonusFood = { x: pos.x, y: pos.y, timer: 180 };
  }

  // ===== HIGH SCORE =====
  function getHighScore() {
    try {
      var val = localStorage.getItem('neonSnake_hs_' + difficulty);
      return val ? parseInt(val, 10) : 0;
    } catch(e) {
      return 0;
    }
  }

  function setHighScore(val) {
    try {
      localStorage.setItem('neonSnake_hs_' + difficulty, String(val));
    } catch(e) {
      // ignore
    }
  }

  // ===== GAME INITIALIZATION =====
  function initGame(diff) {
    difficulty = diff;
    snake = [
      { x: Math.floor(GRID / 2), y: Math.floor(GRID / 2) },
      { x: Math.floor(GRID / 2) - 1, y: Math.floor(GRID / 2) },
      { x: Math.floor(GRID / 2) - 2, y: Math.floor(GRID / 2) },
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    highScore = getHighScore();
    bonusFood = null;
    particles = [];
    accumulator = 0;
    lastTick = 0;
    gamePaused = false;
    spawnFood();
    updateHUD();
  }

  function updateHUD() {
    hudScore.textContent = score;
    hudHS.textContent = highScore;
    hudDiff.textContent = DIFFICULTIES[difficulty].label;
  }

  // ===== GAME LOGIC =====
  function tick() {
    // Apply queued direction
    direction = { x: nextDirection.x, y: nextDirection.y };

    // Calculate new head position
    var head = {
      x: snake[0].x + direction.x,
      y: snake[0].y + direction.y,
    };

    // Wrap or collision
    var cfg = DIFFICULTIES[difficulty];
    if (cfg.wrap) {
      head.x = ((head.x % GRID) + GRID) % GRID;
      head.y = ((head.y % GRID) + GRID) % GRID;
    } else {
      // Wall collision
      if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
        gameOver();
        return;
      }
    }

    // Self collision
    for (var i = 0; i < snake.length; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) {
        gameOver();
        return;
      }
    }

    // Move snake
    snake.unshift(head);

    // Check food
    var ate = false;
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      ate = true;
      playSound('eat');
      spawnParticles(food.x, food.y, '#00ffc8', 12);
      spawnFood();
    }

    // Check bonus food
    if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
      score += 50;
      ate = true;
      playSound('bonus');
      spawnParticles(bonusFood.x, bonusFood.y, '#ff00c8', 20);
      bonusFood = null;
    }

    if (!ate) {
      snake.pop();
    }

    // Update high score
    if (score > highScore) {
      highScore = score;
      setHighScore(highScore);
    }
    updateHUD();

    // Bonus food timer
    if (bonusFood) {
      bonusFood.timer--;
      if (bonusFood.timer <= 0) {
        bonusFood = null;
      }
    }

    // Random bonus spawn (insane only)
    if (cfg.bonus && !bonusFood && Math.random() < 0.005) {
      spawnBonusFood();
    }
  }

  function gameOver() {
    gameRunning = false;
    playSound('die');
    spawnParticles(snake[0].x, snake[0].y, '#ff4466', 25);
    goScore.textContent = score;
    goHS.textContent = highScore;
    goDiff.textContent = DIFFICULTIES[difficulty].label;
    gameoverOverlay.classList.remove('hidden');
    pauseIndicator.classList.remove('visible');
  }

  // ===== RENDERING =====
  /** Draw the animated neon grid background */
  function drawGrid() {
    gridPhase += 0.015;
    var alpha = 0.04 + Math.sin(gridPhase) * 0.02;
    ctx.strokeStyle = 'rgba(0, 255, 200, ' + alpha + ')';
    ctx.lineWidth = 0.5;
    for (var i = 0; i <= GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, GRID * CELL);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(GRID * CELL, i * CELL);
      ctx.stroke();
    }
  }

  /** Draw the snake with gradient and glow */
  function drawSnake() {
    var len = snake.length;
    for (var i = len - 1; i >= 0; i--) {
      var seg = snake[i];
      var t = i / len;
      var x = seg.x * CELL;
      var y = seg.y * CELL;
      var pad = 1;

      // Gradient from head (cyan) to tail (blue-purple)
      var r = Math.round(0 + t * 100);
      var g = Math.round(255 - t * 155);
      var b = Math.round(200 - t * 100);
      var color = 'rgb(' + r + ',' + g + ',' + b + ')';

      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = i === 0 ? 15 : 6;

      // Rounded rectangle
      var radius = i === 0 ? 5 : 3;
      roundRect(ctx, x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, radius);
      ctx.fill();

      // Head eyes
      if (i === 0) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#0a0a0f';
        var eyeSize = 3;
        var e1x, e1y, e2x, e2y;
        if (direction.x === 1) {
          e1x = x + 14; e1y = y + 6; e2x = x + 14; e2y = y + 14;
        } else if (direction.x === -1) {
          e1x = x + 6; e1y = y + 6; e2x = x + 6; e2y = y + 14;
        } else if (direction.y === -1) {
          e1x = x + 6; e1y = y + 6; e2x = x + 14; e2y = y + 6;
        } else {
          e1x = x + 6; e1y = y + 14; e2x = x + 14; e2y = y + 14;
        }
        ctx.beginPath();
        ctx.arc(e1x, e1y, eyeSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(e2x, e2y, eyeSize, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.shadowBlur = 0;
  }

  /** Draw food with pulsing glow */
  function drawFood() {
    var pulse = 0.7 + Math.sin(Date.now() * 0.006) * 0.3;
    var x = food.x * CELL + CELL / 2;
    var y = food.y * CELL + CELL / 2;
    var r = (CELL / 2 - 2) * (0.85 + pulse * 0.15);

    ctx.shadowColor = '#00ffc8';
    ctx.shadowBlur = 12 * pulse;
    ctx.fillStyle = '#00ffc8';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    // Inner highlight
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(x - 2, y - 2, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
  }

  /** Draw bonus food (pink diamond) */
  function drawBonusFood() {
    if (!bonusFood) return;
    var flash = bonusFood.timer < 60
      ? (Math.sin(Date.now() * 0.02) > 0 ? 1 : 0.3)
      : 1;
    var x = bonusFood.x * CELL + CELL / 2;
    var y = bonusFood.y * CELL + CELL / 2;
    var s = CELL / 2 - 1;

    ctx.globalAlpha = flash;
    ctx.shadowColor = '#ff00c8';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#ff00c8';
    ctx.beginPath();
    ctx.moveTo(x, y - s);
    ctx.lineTo(x + s, y);
    ctx.lineTo(x, y + s);
    ctx.lineTo(x - s, y);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  /** Rounded rectangle helper */
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  /** Main render function */
  function render() {
    // Clear
    ctx.fillStyle = '#06060c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid
    drawGrid();

    // Food
    drawFood();
    drawBonusFood();

    // Snake
    drawSnake();

    // Particles
    updateParticles();
  }

  // ===== GAME LOOP (requestAnimationFrame + fixed-step) =====
  function gameLoop(timestamp) {
    if (!gameRunning) return;

    if (gamePaused) {
      render();
      requestAnimationFrame(gameLoop);
      return;
    }

    if (!lastTick) lastTick = timestamp;
    var delta = timestamp - lastTick;
    lastTick = timestamp;

    var interval = DIFFICULTIES[difficulty].speed;
    accumulator += delta;

    // Fixed-step updates
    while (accumulator >= interval) {
      tick();
      accumulator -= interval;
      if (!gameRunning) return;
    }

    // Render every frame
    render();
    requestAnimationFrame(gameLoop);
  }

  // ===== INPUT HANDLING =====

  /** Queue a direction change (prevents 180 reversal) */
  function setDirection(dx, dy) {
    // Prevent reversing into self
    if (direction.x === -dx && direction.y === -dy) return;
    // Prevent queuing opposite of already-queued direction
    if (nextDirection.x === -dx && nextDirection.y === -dy) return;
    nextDirection = { x: dx, y: dy };
  }

  // Keyboard
  document.addEventListener('keydown', function(e) {
    var key = e.key;

    // Pause toggle
    if (key === 'Escape' || key === ' ') {
      e.preventDefault();
      if (gameRunning) togglePause();
      return;
    }

    if (!gameRunning || gamePaused) return;

    if (key === 'ArrowUp' || key === 'w' || key === 'W') {
      e.preventDefault();
      setDirection(0, -1);
    } else if (key === 'ArrowDown' || key === 's' || key === 'S') {
      e.preventDefault();
      setDirection(0, 1);
    } else if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
      e.preventDefault();
      setDirection(-1, 0);
    } else if (key === 'ArrowRight' || key === 'd' || key === 'D') {
      e.preventDefault();
      setDirection(1, 0);
    }
  });

  // Touch D-pad
  var dpadBtns = document.querySelectorAll('.dpad-btn');
  for (var di = 0; di < dpadBtns.length; di++) {
    (function(btn) {
      btn.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        if (!gameRunning || gamePaused) return;
        var dir = btn.getAttribute('data-dir');
        if (dir === 'up')    setDirection(0, -1);
        if (dir === 'down')  setDirection(0, 1);
        if (dir === 'left')  setDirection(-1, 0);
        if (dir === 'right') setDirection(1, 0);
      });
    })(dpadBtns[di]);
  }

  // Swipe gestures on canvas
  var touchStartX = null;
  var touchStartY = null;
  canvas.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  canvas.addEventListener('touchend', function(e) {
    if (touchStartX === null || !gameRunning || gamePaused) return;
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    var absDx = Math.abs(dx);
    var absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 20) return;
    if (absDx > absDy) {
      setDirection(dx > 0 ? 1 : -1, 0);
    } else {
      setDirection(0, dy > 0 ? 1 : -1);
    }
    touchStartX = null;
    touchStartY = null;
  }, { passive: true });

  // ===== PAUSE =====
  function togglePause() {
    gamePaused = !gamePaused;
    if (gamePaused) {
      pauseIndicator.classList.add('visible');
    } else {
      pauseIndicator.classList.remove('visible');
      lastTick = 0;
      accumulator = 0;
    }
  }

  // ===== UI EVENT HANDLERS =====

  // Difficulty selection
  for (var bi = 0; bi < diffBtns.length; bi++) {
    (function(btn) {
      btn.addEventListener('click', function() {
        for (var j = 0; j < diffBtns.length; j++) {
          diffBtns[j].classList.remove('active');
          diffBtns[j].setAttribute('aria-checked', 'false');
        }
        btn.classList.add('active');
        btn.setAttribute('aria-checked', 'true');
      });
    })(diffBtns[bi]);
  }

  // Start button
  startBtn.addEventListener('click', function() {
    initAudio();
    var selected = document.querySelector('.diff-btn.active');
    var diff = selected ? selected.getAttribute('data-diff') : 'classic';
    initGame(diff);
    startOverlay.classList.add('hidden');
    gameRunning = true;
    lastTick = 0;
    accumulator = 0;
    requestAnimationFrame(gameLoop);
  });

  // Restart button
  restartBtn.addEventListener('click', function() {
    gameoverOverlay.classList.add('hidden');
    initGame(difficulty);
    gameRunning = true;
    lastTick = 0;
    accumulator = 0;
    requestAnimationFrame(gameLoop);
  });

  // Menu button
  menuBtn.addEventListener('click', function() {
    gameoverOverlay.classList.add('hidden');
    startOverlay.classList.remove('hidden');
    // Render empty grid
    ctx.fillStyle = '#06060c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid();
  });

  // Mute toggle
  muteBtn.addEventListener('click', function() {
    initAudio();
    muted = !muted;
    muteBtn.textContent = muted ? '\uf027' : '\uf028';
    muteBtn.setAttribute('aria-label', muted ? 'Unmute sound' : 'Mute sound');
  });

  // ===== RESPONSIVE CANVAS SCALING =====
  function resizeCanvas() {
    var maxW = Math.min(window.innerWidth * 0.96, 560);
    var maxH = window.innerHeight * 0.6;
    var scale = Math.min(maxW / canvas.width, maxH / canvas.height, 1);
    canvas.style.width = Math.round(canvas.width * scale) + 'px';
    canvas.style.height = Math.round(canvas.height * scale) + 'px';
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ===== INITIAL RENDER =====
  ctx.fillStyle = '#06060c';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawGrid();

})();
</script>
</body>
</html>
