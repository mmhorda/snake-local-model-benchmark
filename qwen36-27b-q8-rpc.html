<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON SNAKE</title>
<style>
/* === RESET & BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a12;
  --panel: rgba(12, 12, 28, 0.82);
  --border: rgba(0, 255, 255, 0.18);
  --neon-cyan: #0ff;
  --neon-magenta: #f0f;
  --neon-green: #39ff14;
  --neon-yellow: #ffe600;
  --neon-red: #ff3344;
  --text: #e0e0f0;
  --text-dim: #8888aa;
  --glow-cyan: 0 0 8px #0ff, 0 0 20px rgba(0,255,255,0.35);
  --glow-magenta: 0 0 8px #f0f, 0 0 20px rgba(255,0,255,0.35);
  --glow-green: 0 0 8px #39ff14, 0 0 20px rgba(57,255,20,0.35);
  --radius: 12px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
}

/* === LAYOUT === */
#app {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; height: 100%; position: relative;
}

/* === HUD === */
#hud {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 18px; align-items: center; z-index: 10;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 6px 18px;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  font-size: 14px; letter-spacing: 0.5px;
}
#hud .stat { display: flex; align-items: center; gap: 5px; }
#hud .label { color: var(--text-dim); text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
#hud .value { color: var(--neon-cyan); font-weight: 700; font-variant-numeric: tabular-nums; text-shadow: var(--glow-cyan); }
#mute-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-dim); cursor: pointer; padding: 3px 8px; font-size: 16px;
  transition: color 0.2s, border-color 0.2s;
}
#mute-btn:hover, #mute-btn:focus-visible { color: var(--neon-cyan); border-color: var(--neon-cyan); }
#mute-btn:focus-visible { outline: 2px solid var(--neon-cyan); outline-offset: 2px; }

/* === CANVAS === */
#game-canvas {
  border: 2px solid var(--neon-cyan);
  border-radius: 4px;
  box-shadow: var(--glow-cyan), inset 0 0 30px rgba(0,255,255,0.04);
  image-rendering: pixelated;
}

/* === OVERLAYS === */
.overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(6, 6, 14, 0.92);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  z-index: 20; opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
.overlay.active { opacity: 1; pointer-events: auto; }

/* === START MENU === */
#start-menu .title {
  font-size: clamp(36px, 8vw, 72px); font-weight: 900;
  letter-spacing: 6px; text-transform: uppercase;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(0,255,255,0.5));
  animation: titlePulse 2.5s ease-in-out infinite alternate;
}
@keyframes titlePulse {
  0% { filter: drop-shadow(0 0 12px rgba(0,255,255,0.5)); }
  100% { filter: drop-shadow(0 0 24px rgba(255,0,255,0.6)); }
}
#start-menu .subtitle {
  color: var(--text-dim); font-size: 14px; letter-spacing: 3px;
  text-transform: uppercase; margin-top: 4px; margin-bottom: 28px;
}
.menu-group { margin-bottom: 20px; text-align: center; }
.menu-group .group-label {
  color: var(--text-dim); font-size: 11px; text-transform: uppercase;
  letter-spacing: 2px; margin-bottom: 8px;
}
.difficulty-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.diff-btn {
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); padding: 8px 20px; cursor: pointer;
  font-family: var(--font); font-size: 14px; font-weight: 600;
  transition: all 0.2s; letter-spacing: 0.5px;
}
.diff-btn:hover, .diff-btn:focus-visible {
  border-color: var(--neon-cyan); color: var(--neon-cyan);
  box-shadow: var(--glow-cyan);
}
.diff-btn.selected {
  background: rgba(0,255,255,0.12); border-color: var(--neon-cyan);
  color: var(--neon-cyan); box-shadow: var(--glow-cyan);
}
.diff-btn:focus-visible { outline: 2px solid var(--neon-cyan); outline-offset: 2px; }
.instructions {
  color: var(--text-dim); font-size: 13px; line-height: 1.7;
  max-width: 340px; margin: 0 auto 24px;
}
.instructions kbd {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px; padding: 1px 6px; font-family: var(--font); font-size: 12px;
}
.start-btn {
  background: linear-gradient(135deg, rgba(0,255,255,0.15), rgba(255,0,255,0.15));
  border: 1px solid var(--neon-cyan); border-radius: var(--radius);
  color: #fff; padding: 14px 48px; cursor: pointer;
  font-family: var(--font); font-size: 18px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  transition: all 0.25s;
}
.start-btn:hover, .start-btn:focus-visible {
  box-shadow: var(--glow-cyan), var(--glow-magenta);
  transform: scale(1.04);
}
.start-btn:focus-visible { outline: 2px solid var(--neon-magenta); outline-offset: 3px; }

/* === GAME OVER === */
#gameover-menu .go-title {
  font-size: clamp(28px, 6vw, 52px); font-weight: 900;
  color: var(--neon-red); letter-spacing: 4px; text-transform: uppercase;
  text-shadow: 0 0 12px var(--neon-red), 0 0 30px rgba(255,51,68,0.4);
  margin-bottom: 24px;
}
.go-stats { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
.go-stat {
  display: flex; justify-content: space-between; gap: 40px;
  font-size: 16px;
}
.go-stat .go-label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-size: 13px; }
.go-stat .go-value { color: var(--neon-cyan); font-weight: 700; text-shadow: var(--glow-cyan); font-variant-numeric: tabular-nums; }
.go-stat .go-value.best { color: var(--neon-yellow); text-shadow: 0 0 8px var(--neon-yellow); }

/* === PAUSE === */
#pause-menu .pause-title {
  font-size: clamp(24px, 5vw, 44px); font-weight: 800;
  color: var(--neon-magenta); letter-spacing: 4px; text-transform: uppercase;
  text-shadow: var(--glow-magenta); margin-bottom: 12px;
}
#pause-menu .pause-hint { color: var(--text-dim); font-size: 14px; }

/* === TOUCH D-PAD === */
#dpad {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: none; z-index: 15;
  width: 160px; height: 160px;
}
.dpad-btn {
  position: absolute; width: 52px; height: 52px;
  background: rgba(0,255,255,0.08); border: 1px solid rgba(0,255,255,0.25);
  border-radius: 10px; color: var(--neon-cyan); font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  transition: background 0.15s;
}
.dpad-btn:active { background: rgba(0,255,255,0.22); }
#dpad-up { top: 0; left: 50%; transform: translateX(-50%); }
#dpad-down { bottom: 0; left: 50%; transform: translateX(-50%); }
#dpad-left { left: 0; top: 50%; transform: translateY(-50%); }
#dpad-right { right: 0; top: 50%; transform: translateY(-50%); }

/* === RESPONSIVE === */
@media (max-width: 600px) {
  #hud { font-size: 12px; gap: 10px; padding: 5px 12px; }
  #dpad { display: grid; }
}
@media (hover: none) and (pointer: coarse) {
  #dpad { display: grid; }
}

/* === REDUCED MOTION === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
<div id="app">
  <!-- HUD -->
  <div id="hud">
    <div class="stat"><span class="label">Score</span><span class="value" id="hud-score">0</span></div>
    <div class="stat"><span class="label">Best</span><span class="value" id="hud-best">0</span></div>
    <button id="mute-btn" aria-label="Toggle sound" title="Mute/Unmute">🔊</button>
  </div>

  <!-- Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Touch D-Pad -->
  <div id="dpad" aria-hidden="true">
    <div class="dpad-btn" id="dpad-up" role="button" aria-label="Move up">▲</div>
    <div class="dpad-btn" id="dpad-left" role="button" aria-label="Move left">◀</div>
    <div class="dpad-btn" id="dpad-right" role="button" aria-label="Move right">▶</div>
    <div class="dpad-btn" id="dpad-down" role="button" aria-label="Move down">▼</div>
  </div>

  <!-- Start Menu -->
  <div class="overlay active" id="start-menu">
    <div class="title">NEON SNAKE</div>
    <div class="subtitle">Cyberpunk Arcade</div>
    <div class="menu-group">
      <div class="group-label">Difficulty</div>
      <div class="difficulty-btns">
        <button class="diff-btn" data-diff="chill">Chill</button>
        <button class="diff-btn selected" data-diff="classic">Classic</button>
        <button class="diff-btn" data-diff="insane">Insane</button>
      </div>
    </div>
    <div class="instructions">
      <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to move<br>
      <kbd>Space</kbd> / <kbd>Esc</kbd> to pause &middot; Swipe or use D-pad on mobile
    </div>
    <button class="start-btn" id="start-btn">Start Game</button>
  </div>

  <!-- Pause Menu -->
  <div class="overlay" id="pause-menu">
    <div class="pause-title">Paused</div>
    <div class="pause-hint">Press <kbd>Space</kbd> / <kbd>Esc</kbd> to resume</div>
  </div>

  <!-- Game Over Menu -->
  <div class="overlay" id="gameover-menu">
    <div class="go-title">Game Over</div>
    <div class="go-stats">
      <div class="go-stat"><span class="go-label">Score</span><span class="go-value" id="go-score">0</span></div>
      <div class="go-stat"><span class="go-label">High Score</span><span class="go-value best" id="go-best">0</span></div>
      <div class="go-stat"><span class="go-label">Difficulty</span><span class="go-value" id="go-diff">Classic</span></div>
    </div>
    <button class="start-btn" id="restart-btn">Play Again</button>
  </div>
</div>

<script>
// ============================================================
// NEON SNAKE - Premium Cyberpunk Arcade Snake Game
// Single-file, zero dependencies, vanilla HTML/CSS/JS
// ============================================================

(function() {
  'use strict';

  // --- CONSTANTS ---
  var GRID_COLS = 24;
  var GRID_ROWS = 24;
  var DIFFICULTY = {
    chill:   { label: 'Chill',   baseInterval: 160, wallDeath: false, bonusFood: false },
    classic: { label: 'Classic', baseInterval: 110, wallDeath: true,  bonusFood: false },
    insane:  { label: 'Insane',  baseInterval: 65,  wallDeath: true,  bonusFood: true  },
  };

  // --- DOM REFERENCES ---
  var canvas = document.getElementById('game-canvas');
  var ctx = canvas.getContext('2d');
  var hudScore = document.getElementById('hud-score');
  var hudBest = document.getElementById('hud-best');
  var muteBtn = document.getElementById('mute-btn');
  var startMenu = document.getElementById('start-menu');
  var pauseMenu = document.getElementById('pause-menu');
  var gameoverMenu = document.getElementById('gameover-menu');
  var goScore = document.getElementById('go-score');
  var goBest = document.getElementById('go-best');
  var goDiff = document.getElementById('go-diff');
  var startBtn = document.getElementById('start-btn');
  var restartBtn = document.getElementById('restart-btn');
  var diffBtns = document.querySelectorAll('.diff-btn');

  // --- GAME STATE ---
  var snake = [];
  var direction = { x: 1, y: 0 };
  var nextDirection = { x: 1, y: 0 };
  var food = null;
  var bonusFood = null;
  var score = 0;
  var highScore = 0;
  var difficulty = 'classic';
  var gameState = 'menu'; // menu | playing | paused | gameover
  var lastTick = 0;
  var tickInterval = 110;
  var particles = [];
  var gridPhase = 0;
  var muted = false;
  var cellSize = 20;
  var animFrameId = null;

  // --- AUDIO (Web Audio API) ---
  var audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playTone(freq, duration, type, vol) {
    if (muted) return;
    try {
      ensureAudio();
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = type || 'square';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    } catch (e) { /* audio not available */ }
  }
  function sfxEat() {
    playTone(660, 0.10, 'square', 0.10);
    setTimeout(function() { playTone(880, 0.08, 'square', 0.07); }, 60);
  }
  function sfxBonus() {
    playTone(880, 0.08, 'square', 0.12);
    setTimeout(function() { playTone(1100, 0.10, 'square', 0.10); }, 70);
    setTimeout(function() { playTone(1320, 0.12, 'square', 0.08); }, 140);
  }
  function sfxDie() {
    playTone(200, 0.35, 'sawtooth', 0.12);
    setTimeout(function() { playTone(120, 0.40, 'sawtooth', 0.10); }, 150);
  }
  function sfxTick() {
    playTone(440, 0.03, 'sine', 0.04);
  }

  // --- PARTICLES ---
  function spawnParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 1 + Math.random() * 3;
      particles.push({
        x: x * cellSize + cellSize / 2,
        y: y * cellSize + cellSize / 2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        size: 2 + Math.random() * 3,
        color: color,
      });
    }
  }
  function updateParticles() {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }
  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // --- HIGH SCORE (localStorage) ---
  function loadHighScore(diff) {
    try { return parseInt(localStorage.getItem('neon_snake_hs_' + diff) || '0', 10); }
    catch (e) { return 0; }
  }
  function saveHighScore(diff, val) {
    try { localStorage.setItem('neon_snake_hs_' + diff, String(val)); } catch (e) {}
  }

  // --- CANVAS SIZING ---
  function resizeCanvas() {
    var hudH = 40;
    var dpadH = 0;
    var mq = window.matchMedia('(hover: none) and (pointer: coarse)');
    if (mq.matches) dpadH = 180;
    var maxW = window.innerWidth - 24;
    var maxH = window.innerHeight - hudH - dpadH - 24;
    cellSize = Math.floor(Math.min(maxW / GRID_COLS, maxH / GRID_ROWS));
    cellSize = Math.max(cellSize, 8);
    canvas.width = cellSize * GRID_COLS;
    canvas.height = cellSize * GRID_ROWS;
  }
  window.addEventListener('resize', function() { if (gameState !== 'menu') resizeCanvas(); });

  // --- FOOD SPAWNING ---
  function randomFreeCell() {
    var occupied = {};
    for (var i = 0; i < snake.length; i++) {
      occupied[snake[i].x + ',' + snake[i].y] = true;
    }
    var free = [];
    for (var x = 0; x < GRID_COLS; x++) {
      for (var y = 0; y < GRID_ROWS; y++) {
        if (!occupied[x + ',' + y]) free.push({ x: x, y: y });
      }
    }
    // Also avoid spawning on existing bonus food
    if (bonusFood) {
      var bk = bonusFood.x + ',' + bonusFood.y;
      for (var j = 0; j < free.length; j++) {
        if (free[j].x + ',' + free[j].y === bk) {
          free.splice(j, 1);
          break;
        }
      }
    }
    if (free.length === 0) return { x: 0, y: 0 };
    return free[Math.floor(Math.random() * free.length)];
  }
  function spawnFood() {
    food = randomFreeCell();
  }
  function spawnBonusFood() {
    var pos = randomFreeCell();
    bonusFood = { x: pos.x, y: pos.y, timer: 80 };
  }

  // --- GAME INIT ---
  function initGame() {
    var midX = Math.floor(GRID_COLS / 2);
    var midY = Math.floor(GRID_ROWS / 2);
    snake = [
      { x: midX, y: midY },
      { x: midX - 1, y: midY },
      { x: midX - 2, y: midY },
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    particles = [];
    bonusFood = null;
    tickInterval = DIFFICULTY[difficulty].baseInterval;
    highScore = loadHighScore(difficulty);
    spawnFood();
    updateHUD();
  }

  // --- HUD UPDATE ---
  function updateHUD() {
    hudScore.textContent = score;
    hudBest.textContent = highScore;
  }

  // --- GAME TICK ---
  function gameTick() {
    // Apply queued direction (prevent 180 reversal)
    direction = { x: nextDirection.x, y: nextDirection.y };

    // Compute new head
    var head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

    // Wall handling
    var cfg = DIFFICULTY[difficulty];
    if (cfg.wallDeath) {
      if (head.x < 0 || head.x >= GRID_COLS || head.y < 0 || head.y >= GRID_ROWS) {
        doGameOver();
        return;
      }
    } else {
      // Wrap
      head.x = (head.x + GRID_COLS) % GRID_COLS;
      head.y = (head.y + GRID_ROWS) % GRID_ROWS;
    }

    // Self collision
    for (var i = 0; i < snake.length; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) {
        doGameOver();
        return;
      }
    }

    snake.unshift(head);

    // Food check
    var ate = false;
    if (food && head.x === food.x && head.y === food.y) {
      score += 10;
      ate = true;
      sfxEat();
      spawnParticles(food.x, food.y, '#39ff14', 14);
      spawnFood();
      // Speed up slightly
      tickInterval = Math.max(40, tickInterval - 1);
    } else if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
      score += 50;
      ate = true;
      sfxBonus();
      spawnParticles(bonusFood.x, bonusFood.y, '#ffe600', 22);
      bonusFood = null;
    } else {
      snake.pop();
    }

    // Bonus food timer
    if (bonusFood) {
      bonusFood.timer--;
      if (bonusFood.timer <= 0) bonusFood = null;
    }

    // Spawn bonus food randomly in Insane mode
    if (cfg.bonusFood && !bonusFood && Math.random() < 0.008) {
      spawnBonusFood();
    }

    // High score
    if (score > highScore) {
      highScore = score;
      saveHighScore(difficulty, highScore);
    }

    updateHUD();
  }

  // --- GAME OVER ---
  function doGameOver() {
    gameState = 'gameover';
    sfxDie();
    // Particles along the snake
    for (var i = 0; i < snake.length; i++) {
      spawnParticles(snake[i].x, snake[i].y, '#ff3344', 4);
    }
    goScore.textContent = score;
    goBest.textContent = highScore;
    goDiff.textContent = DIFFICULTY[difficulty].label;
    gameoverMenu.classList.add('active');
  }

  // --- DRAWING ---
  function drawGrid() {
    gridPhase += 0.015;
    var alpha = 0.04 + Math.sin(gridPhase) * 0.015;
    ctx.strokeStyle = 'rgba(0, 255, 255, ' + alpha + ')';
    ctx.lineWidth = 0.5;
    for (var x = 0; x <= GRID_COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * cellSize, 0);
      ctx.lineTo(x * cellSize, canvas.height);
      ctx.stroke();
    }
    for (var y = 0; y <= GRID_ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * cellSize);
      ctx.lineTo(canvas.width, y * cellSize);
      ctx.stroke();
    }
  }

  function drawSnake() {
    var len = snake.length;
    for (var i = len - 1; i >= 0; i--) {
      var seg = snake[i];
      var t = i / len;
      // Gradient from cyan (head) to magenta (tail)
      var r = Math.round(0 + t * 255);
      var g = Math.round(255 - t * 255);
      var b = Math.round(255 - t * 0);
      var color = 'rgb(' + r + ',' + g + ',' + b + ')';

      var pad = i === 0 ? 0.5 : 1.5;
      var x = seg.x * cellSize + pad;
      var y = seg.y * cellSize + pad;
      var s = cellSize - pad * 2;

      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = i === 0 ? 12 : 6;

      // Rounded rect
      var radius = Math.min(s * 0.3, 4);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + s, y, x + s, y + s, radius);
      ctx.arcTo(x + s, y + s, x, y + s, radius);
      ctx.arcTo(x, y + s, x, y, radius);
      ctx.arcTo(x, y, x + s, y, radius);
      ctx.closePath();
      ctx.fill();

      // Head eyes
      if (i === 0) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#0a0a12';
        var eyeSize = Math.max(2, cellSize * 0.15);
        var ex1 = seg.x * cellSize + cellSize * 0.3 + direction.x * 2;
        var ey1 = seg.y * cellSize + cellSize * 0.3 + direction.y * 2;
        var ex2 = seg.x * cellSize + cellSize * 0.7 + direction.x * 2;
        var ey2 = seg.y * cellSize + cellSize * 0.7 + direction.y * 2;
        ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.shadowBlur = 0;
  }

  function drawFood() {
    if (!food) return;
    var cx = food.x * cellSize + cellSize / 2;
    var cy = food.y * cellSize + cellSize / 2;
    var r = cellSize * 0.38;
    var pulse = 1 + Math.sin(Date.now() * 0.006) * 0.12;

    ctx.shadowColor = '#39ff14';
    ctx.shadowBlur = 14 * pulse;
    ctx.fillStyle = '#39ff14';
    ctx.beginPath();
    ctx.arc(cx, cy, r * pulse, 0, Math.PI * 2);
    ctx.fill();

    // Inner highlight
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(cx - r * 0.2, cy - r * 0.2, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawBonusFood() {
    if (!bonusFood) return;
    var cx = bonusFood.x * cellSize + cellSize / 2;
    var cy = bonusFood.y * cellSize + cellSize / 2;
    var r = cellSize * 0.42;
    var pulse = 1 + Math.sin(Date.now() * 0.01) * 0.18;
    var alpha = bonusFood.timer < 20 ? (bonusFood.timer / 20) : 1;

    ctx.globalAlpha = alpha;
    ctx.shadowColor = '#ffe600';
    ctx.shadowBlur = 18 * pulse;
    ctx.fillStyle = '#ffe600';

    // Star shape
    ctx.beginPath();
    for (var i = 0; i < 5; i++) {
      var angle = (i * 4 * Math.PI) / 5 - Math.PI / 2 + Date.now() * 0.002;
      var px = cx + Math.cos(angle) * r * pulse;
      var py = cy + Math.sin(angle) * r * pulse;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  function draw() {
    // Clear
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawGrid();
    drawFood();
    drawBonusFood();
    drawSnake();
    drawParticles();
  }

  // --- MAIN LOOP (requestAnimationFrame with fixed-step) ---
  function mainLoop(timestamp) {
    animFrameId = requestAnimationFrame(mainLoop);

    // Fixed-step game tick
    if (gameState === 'playing') {
      if (timestamp - lastTick >= tickInterval) {
        gameTick();
        lastTick = timestamp;
      }
    }

    // Always update particles and draw
    updateParticles();
    draw();
  }

  // --- INPUT HANDLING ---
  function setDirection(dx, dy) {
    // Prevent 180 reversal
    if (direction.x === -dx && direction.y === -dy) return;
    if (dx !== 0 && direction.x === dx) return;
    if (dy !== 0 && direction.y === dy) return;
    nextDirection = { x: dx, y: dy };
  }

  // Keyboard
  document.addEventListener('keydown', function(e) {
    // Pause toggle
    if (e.key === 'Escape' || e.key === ' ') {
      e.preventDefault();
      if (gameState === 'playing') pauseGame();
      else if (gameState === 'paused') resumeGame();
      return;
    }

    if (gameState !== 'playing') return;

    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') { e.preventDefault(); setDirection(0, -1); }
    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { e.preventDefault(); setDirection(0, 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') { e.preventDefault(); setDirection(-1, 0); }
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { e.preventDefault(); setDirection(1, 0); }
  });

  // Swipe detection
  var touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', function(e) {
    var t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: true });
  canvas.addEventListener('touchend', function(e) {
    if (gameState !== 'playing') return;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStartX;
    var dy = t.clientY - touchStartY;
    var absDx = Math.abs(dx);
    var absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 20) return; // too small
    if (absDx > absDy) {
      setDirection(dx > 0 ? 1 : -1, 0);
    } else {
      setDirection(0, dy > 0 ? 1 : -1);
    }
  }, { passive: true });

  // D-Pad buttons
  document.getElementById('dpad-up').addEventListener('pointerdown', function(e) { e.preventDefault(); if (gameState === 'playing') setDirection(0, -1); });
  document.getElementById('dpad-down').addEventListener('pointerdown', function(e) { e.preventDefault(); if (gameState === 'playing') setDirection(0, 1); });
  document.getElementById('dpad-left').addEventListener('pointerdown', function(e) { e.preventDefault(); if (gameState === 'playing') setDirection(-1, 0); });
  document.getElementById('dpad-right').addEventListener('pointerdown', function(e) { e.preventDefault(); if (gameState === 'playing') setDirection(1, 0); });

  // --- MENU HANDLERS ---
  function showOverlay(el) {
    startMenu.classList.remove('active');
    pauseMenu.classList.remove('active');
    gameoverMenu.classList.remove('active');
    if (el) el.classList.add('active');
  }

  function startGame() {
    ensureAudio();
    resizeCanvas();
    initGame();
    gameState = 'playing';
    lastTick = performance.now();
    showOverlay(null);
  }

  function pauseGame() {
    gameState = 'paused';
    showOverlay(pauseMenu);
  }

  function resumeGame() {
    gameState = 'playing';
    lastTick = performance.now();
    showOverlay(null);
  }

  // Difficulty selection
  for (var i = 0; i < diffBtns.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function() {
        for (var j = 0; j < diffBtns.length; j++) {
          diffBtns[j].classList.remove('selected');
        }
        btn.classList.add('selected');
        difficulty = btn.dataset.diff;
        sfxTick();
      });
    })(diffBtns[i]);
  }

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  // Mute toggle
  muteBtn.addEventListener('click', function() {
    muted = !muted;
    muteBtn.textContent = muted ? '\uD83D\uDD07' : '\uD83D\uDD0A';
    muteBtn.setAttribute('aria-label', muted ? 'Unmute sound' : 'Mute sound');
    if (!muted) sfxTick();
  });

  // --- BOOT ---
  resizeCanvas();
  highScore = loadHighScore(difficulty);
  updateHUD();
  animFrameId = requestAnimationFrame(mainLoop);

})();
</script>
</body>
</html>
