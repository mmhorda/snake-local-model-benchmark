<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Snake</title>
<style>
/* Reset & Base */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;color:#e0e0f0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}

/* Animated Background Grid */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,.03) 1px,transparent 1px);background-size:40px 40px;animation:gridPulse 4s ease-in-out infinite alternate;pointer-events:none;z-index:0}
@keyframes gridPulse{0%{opacity:.4}100%{opacity:.8}}

/* Layout */
#game-container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:1}
canvas{display:block;border:2px solid rgba(0,255,255,.3);border-radius:8px;box-shadow:0 0 30px rgba(0,255,255,.15),inset 0 0 30px rgba(0,255,255,.05);background:#0d0d1a}

/* Glassmorphism Panels */
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;pointer-events:none}
.overlay.active{pointer-events:auto}
.panel{background:rgba(10,10,26,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(0,255,255,.2);border-radius:16px;padding:32px 40px;max-width:420px;width:90%;text-align:center;box-shadow:0 0 40px rgba(0,255,255,.1);transform:scale(.95);opacity:0;transition:transform .3s ease,opacity .3s ease}
.overlay.active .panel{transform:scale(1);opacity:1}
.panel h1{font-size:2.4rem;font-weight:800;background:linear-gradient(135deg,#0ff,#f0f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;animation:titleGlow 2s ease-in-out infinite alternate}
@keyframes titleGlow{0%{filter:drop-shadow(0 0 8px rgba(0,255,255,.5))}100%{filter:drop-shadow(0 0 16px rgba(255,0,255,.5))}}
.panel h2{font-size:1.6rem;font-weight:700;color:#f44;margin-bottom:12px}
.panel p{font-size:.95rem;color:#aab;margin-bottom:16px;line-height:1.5}
.panel .score-display{font-size:1.4rem;font-weight:700;color:#0ff;margin:8px 0}
.panel .high-score{font-size:.9rem;color:#f0f;margin-bottom:12px}
.panel .difficulty-label{font-size:.85rem;color:#889;margin-bottom:16px}

/* Controls */
.control-group{margin:12px 0}
.control-group label{display:block;font-size:.85rem;color:#889;margin-bottom:6px}
select{background:rgba(0,255,255,.08);border:1px solid rgba(0,255,255,.3);color:#e0e0f0;padding:8px 16px;border-radius:8px;font-size:.95rem;cursor:pointer;outline:none;transition:border-color .2s}
select:focus{border-color:#0ff;box-shadow:0 0 8px rgba(0,255,255,.3)}
select option{background:#1a1a2e;color:#e0e0f0}
.btn{display:inline-block;padding:12px 32px;font-size:1rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:all .2s ease;outline:none;font-family:inherit}
.btn:focus-visible{box-shadow:0 0 0 3px rgba(0,255,255,.5)}
.btn-primary{background:linear-gradient(135deg,#0ff,#08f);color:#0a0a12}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,255,255,.4)}
.btn-danger{background:linear-gradient(135deg,#f44,#f0f);color:#fff}
.btn-danger:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(255,0,255,.4)}
.mute-btn{position:absolute;top:16px;right:16px;z-index:20;background:rgba(10,10,26,.7);border:1px solid rgba(0,255,255,.2);color:#e0e0f0;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.85rem;font-family:inherit;transition:all .2s}
.mute-btn:hover{border-color:#0ff}
.mute-btn:focus-visible{box-shadow:0 0 0 3px rgba(0,255,255,.5)}

/* HUD */
#hud{position:absolute;top:16px;left:16px;z-index:5;display:none;font-size:.9rem;color:#aab}
#hud span{color:#0ff;font-weight:700}

/* Mobile D-Pad */
#dpad{position:absolute;bottom:20px;right:20px;z-index:15;display:none;width:140px;height:140px}
#dpad button{position:absolute;width:44px;height:44px;background:rgba(0,255,255,.1);border:1px solid rgba(0,255,255,.3);border-radius:10px;color:#0ff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;-webkit-tap-highlight-color:transparent}
#dpad button:hover,#dpad button:active{background:rgba(0,255,255,.25)}
#dpad button:focus-visible{box-shadow:0 0 0 3px rgba(0,255,255,.5)}
#dpad .up{top:0;left:50%;transform:translateX(-50%)}
#dpad .down{bottom:0;left:50%;transform:translateX(-50%)}
#dpad .left{left:0;top:50%;transform:translateY(-50%)}
#dpad .right{right:0;top:50%;transform:translateY(-50%)}

/* Pause indicator */
#pause-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8;display:none;font-size:2rem;font-weight:800;color:#0ff;text-shadow:0 0 20px rgba(0,255,255,.5);pointer-events:none}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}}

/* Responsive */
@media(max-width:600px){.panel{padding:24px 20px}.panel h1{font-size:1.8rem}#dpad{display:flex}}
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game-canvas"></canvas>
  <div id="hud">Score: <span id="hud-score">0</span></div>
  <button class="mute-btn" id="mute-btn" aria-label="Toggle mute" title="Mute/Unmute">🔊</button>
  <div id="pause-indicator">PAUSED</div>

  <!-- Start Menu -->
  <div class="overlay active" id="start-overlay">
    <div class="panel" role="dialog" aria-label="Start menu">
      <h1>NEON SNAKE</h1>
      <p>A futuristic arcade experience. Eat, grow, survive.</p>
      <div class="control-group">
        <label for="difficulty">Difficulty</label>
        <select id="difficulty" aria-label="Select difficulty">
          <option value="chill">Chill &mdash; relaxed, wrap-around</option>
          <option value="classic" selected>Classic &mdash; traditional rules</option>
          <option value="insane">Insane &mdash; fast, bonus food</option>
        </select>
      </div>
      <p style="font-size:.8rem;color:#667">Arrow keys / WASD to move &middot; Space to pause &middot; Swipe or D-pad on mobile</p>
      <button class="btn btn-primary" id="start-btn" aria-label="Start game">START GAME</button>
    </div>
  </div>

  <!-- Game Over -->
  <div class="overlay" id="gameover-overlay">
    <div class="panel" role="dialog" aria-label="Game over">
      <h2>GAME OVER</h2>
      <div class="score-display">Score: <span id="go-score">0</span></div>
      <div class="high-score">Best: <span id="go-high">0</span></div>
      <div class="difficulty-label" id="go-difficulty"></div>
      <button class="btn btn-danger" id="restart-btn" aria-label="Play again">PLAY AGAIN</button>
    </div>
  </div>

  <!-- Mobile D-Pad -->
  <div id="dpad" aria-label="Direction controls">
    <button class="up" aria-label="Move up">▲</button>
    <button class="down" aria-label="Move down">▼</button>
    <button class="left" aria-label="Move left">◀</button>
    <button class="right" aria-label="Move right">▶</button>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════
// Audio Engine &mdash; Web Audio API, no external files
// ═══════════════════════════════════════════════════
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.muted = false;
  }

  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  toggleMute() {
    this.muted = !this.muted;
    return this.muted;
  }

  // Short blip for eating food
  playEat() {
    if (this.muted || !this.ctx) return;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.connect(g); g.connect(this.ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(600, this.ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(900, this.ctx.currentTime + 0.08);
    g.gain.setValueAtTime(0.15, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.12);
    o.start(); o.stop(this.ctx.currentTime + 0.12);
  }

  // Crunchier sound for bonus food
  playBonusEat() {
    if (this.muted || !this.ctx) return;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.connect(g); g.connect(this.ctx.destination);
    o.type = 'triangle';
    o.frequency.setValueAtTime(800, this.ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1400, this.ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.2, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2);
    o.start(); o.stop(this.ctx.currentTime + 0.2);
  }

  // Death sound
  playDeath() {
    if (this.muted || !this.ctx) return;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.connect(g); g.connect(this.ctx.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(400, this.ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 0.4);
    g.gain.setValueAtTime(0.15, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.4);
    o.start(); o.stop(this.ctx.currentTime + 0.4);
  }
}

// ═══════════════════════════════════════════════════
// Particle System
// ═══════════════════════════════════════════════════
class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = (Math.random() - 0.5) * 4;
    this.life = 1;
    this.decay = 0.02 + Math.random() * 0.03;
    this.size = 2 + Math.random() * 3;
    this.color = color;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
  }
}

class ParticleSystem {
  constructor() { this.particles = []; }
  emit(x, y, count, color) {
    for (let i = 0; i < count; i++) this.particles.push(new Particle(x, y, color));
  }
  update() {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      this.particles[i].update();
      if (this.particles[i].life <= 0) this.particles.splice(i, 1);
    }
  }
  draw(ctx) {
    for (const p of this.particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
}

// ═══════════════════════════════════════════════════
// Snake Game
// ═══════════════════════════════════════════════════
class SnakeGame {
  constructor() {
    this.canvas = document.getElementById('game-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.audio = new AudioEngine();
    this.particles = new ParticleSystem();

    // Grid config
    this.gridSize = 20;
    this.cellSize = 0;

    // Game state
    this.snake = [];
    this.direction = { x: 1, y: 0 };
    this.nextDirection = { x: 1, y: 0 };
    this.food = null;
    this.bonusFood = null;
    this.bonusTimer = 0;
    this.score = 0;
    this.difficulty = 'classic';
    this.state = 'menu';

    // Timing
    this.lastTick = 0;
    this.accumulator = 0;
    this.tickRate = 130;

    // Visuals
    this.gridOffset = 0;
    this.animFrame = null;

    // Swipe tracking
    this.touchStartX = 0;
    this.touchStartY = 0;

    this.setupCanvas();
    this.bindEvents();
    this.render();
  }

  // Responsive canvas sizing
  setupCanvas() {
    const maxW = window.innerWidth - 32;
    const maxH = window.innerHeight - 32;
    const size = Math.min(maxW, maxH, 600);
    this.canvas.width = size;
    this.canvas.height = size;
    this.cellSize = Math.floor(size / this.gridSize);
  }

  // Difficulty configuration
  getDifficultyConfig(diff) {
    switch (diff) {
      case 'chill':   return { tick: 160, wallDeath: false, label: 'Chill' };
      case 'classic': return { tick: 130, wallDeath: true,  label: 'Classic' };
      case 'insane':  return { tick: 70,  wallDeath: true,  label: 'Insane' };
      default:        return { tick: 130, wallDeath: true,  label: 'Classic' };
    }
  }

  // Start or restart the game
  start(difficulty) {
    this.audio.init();
    this.difficulty = difficulty;
    const cfg = this.getDifficultyConfig(difficulty);
    this.tickRate = cfg.tick;

    // Init snake in center
    const mid = Math.floor(this.gridSize / 2);
    this.snake = [
      { x: mid, y: mid },
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid }
    ];
    this.direction = { x: 1, y: 0 };
    this.nextDirection = { x: 1, y: 0 };
    this.score = 0;
    this.bonusFood = null;
    this.bonusTimer = 0;
    this.particles.particles = [];
    this.spawnFood();
    this.state = 'playing';
    this.lastTick = performance.now();
    this.accumulator = 0;

    document.getElementById('start-overlay').classList.remove('active');
    document.getElementById('gameover-overlay').classList.remove('active');
    document.getElementById('hud').style.display = 'block';
    document.getElementById('hud-score').textContent = '0';

    if (this.animFrame) cancelAnimationFrame(this.animFrame);
    this.gameLoop(performance.now());
  }

  // Spawn regular food (never on snake)
  spawnFood() {
    let pos;
    do { pos = this.randomCell(); } while (this.onSnake(pos));
    this.food = pos;
  }

  // Spawn bonus food (Insane mode)
  spawnBonusFood() {
    if (this.bonusFood) return;
    let pos;
    do { pos = this.randomCell(); } while (this.onSnake(pos) || (this.food && pos.x === this.food.x && pos.y === this.food.y));
    this.bonusFood = pos;
    this.bonusTimer = 150;
  }

  randomCell() {
    return {
      x: Math.floor(Math.random() * this.gridSize),
      y: Math.floor(Math.random() * this.gridSize)
    };
  }

  onSnake(pos) {
    return this.snake.some(s => s.x === pos.x && s.y === pos.y);
  }

  // Single game tick
  tick() {
    // Apply queued direction
    this.direction = { ...this.nextDirection };

    // Move head
    const head = {
      x: this.snake[0].x + this.direction.x,
      y: this.snake[0].y + this.direction.y
    };

    const cfg = this.getDifficultyConfig(this.difficulty);

    // Wall handling
    if (cfg.wallDeath) {
      if (head.x < 0 || head.x >= this.gridSize || head.y < 0 || head.y >= this.gridSize) {
        this.gameOver();
        return;
      }
    } else {
      // Wrap around edges
      head.x = (head.x + this.gridSize) % this.gridSize;
      head.y = (head.y + this.gridSize) % this.gridSize;
    }

    // Self collision
    if (this.onSnake(head)) {
      this.gameOver();
      return;
    }

    this.snake.unshift(head);

    // Check food collision
    let ate = false;
    if (this.food && head.x === this.food.x && head.y === this.food.y) {
      this.score += 10;
      this.audio.playEat();
      const cs = this.cellSize;
      this.particles.emit(
        (this.food.x + 0.5) * cs,
        (this.food.y + 0.5) * cs,
        12, '#0ff'
      );
      this.spawnFood();
      ate = true;

      // Insane: 30% chance for bonus food
      if (this.difficulty === 'insane' && Math.random() < 0.3) {
        this.spawnBonusFood();
      }
    }

    // Check bonus food collision
    if (this.bonusFood && head.x === this.bonusFood.x && head.y === this.bonusFood.y) {
      this.score += 50;
      this.audio.playBonusEat();
      const cs = this.cellSize;
      this.particles.emit(
        (this.bonusFood.x + 0.5) * cs,
        (this.bonusFood.y + 0.5) * cs,
        20, '#f0f'
      );
      this.bonusFood = null;
      this.bonusTimer = 0;
      ate = true;
    }

    if (!ate) this.snake.pop();

    // Bonus food timer
    if (this.bonusFood) {
      this.bonusTimer--;
      if (this.bonusTimer <= 0) this.bonusFood = null;
    }

    // Update HUD
    document.getElementById('hud-score').textContent = this.score;
  }

  // Game over handling
  gameOver() {
    this.state = 'gameover';
    this.audio.playDeath();

    // Save high score per difficulty
    const key = `snake_high_${this.difficulty}`;
    const prev = parseInt(localStorage.getItem(key) || '0', 10);
    if (this.score > prev) localStorage.setItem(key, this.score);
    const high = Math.max(this.score, prev);

    document.getElementById('go-score').textContent = this.score;
    document.getElementById('go-high').textContent = high;
    document.getElementById('go-difficulty').textContent = `Difficulty: ${this.getDifficultyConfig(this.difficulty).label}`;
    document.getElementById('gameover-overlay').classList.add('active');
    document.getElementById('hud').style.display = 'none';
  }

  // Pause / resume
  togglePause() {
    if (this.state === 'playing') {
      this.state = 'paused';
      document.getElementById('pause-indicator').style.display = 'block';
    } else if (this.state === 'paused') {
      this.state = 'playing';
      this.lastTick = performance.now();
      this.accumulator = 0;
      document.getElementById('pause-indicator').style.display = 'none';
      this.gameLoop(performance.now());
    }
  }

  // Direction input with 180-degree reversal prevention
  setDirection(dx, dy) {
    if (this.direction.x === -dx && this.direction.y === -dy) return;
    if (dx !== 0 && this.direction.x === dx) return;
    if (dy !== 0 && this.direction.y === dy) return;
    this.nextDirection = { x: dx, y: dy };
  }

  // Main game loop &mdash; requestAnimationFrame with fixed-step timing
  gameLoop(now) {
    if (this.state !== 'playing') return;
    this.animFrame = requestAnimationFrame(t => this.gameLoop(t));

    const delta = now - this.lastTick;
    this.lastTick = now;
    this.accumulator += delta;

    while (this.accumulator >= this.tickRate) {
      this.tick();
      this.accumulator -= this.tickRate;
      if (this.state !== 'playing') return;
    }

    this.render();
  }

  // Render the game frame
  render() {
    const ctx = this.ctx;
    const cs = this.cellSize;
    const w = this.canvas.width;
    const h = this.canvas.height;

    // Background
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, w, h);

    // Animated grid lines
    this.gridOffset = (this.gridOffset + 0.3) % cs;
    ctx.strokeStyle = 'rgba(0,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= w; x += cs) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let y = this.gridOffset; y <= h; y += cs) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    // Draw food
    if (this.food) this.drawFood(this.food.x, this.food.y, '#0f0', '#0ff');

    // Draw bonus food with pulsing effect
    if (this.bonusFood) {
      const pulse = 0.7 + 0.3 * Math.sin(performance.now() / 100);
      ctx.globalAlpha = pulse;
      this.drawFood(this.bonusFood.x, this.bonusFood.y, '#f0f', '#ff0');
      ctx.globalAlpha = 1;
    }

    // Draw snake
    if (this.snake.length) this.drawSnake();

    // Particles
    this.particles.update();
    this.particles.draw(ctx);
  }

  drawFood(fx, fy, color, glow) {
    const ctx = this.ctx;
    const cs = this.cellSize;
    const cx = (fx + 0.5) * cs;
    const cy = (fy + 0.5) * cs;
    const r = cs * 0.35;

    ctx.shadowColor = glow;
    ctx.shadowBlur = 15;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();

    // Inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(cx - r * 0.2, cy - r * 0.2, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  drawSnake() {
    const ctx = this.ctx;
    const cs = this.cellSize;
    const pad = 1;

    for (let i = 0; i < this.snake.length; i++) {
      const s = this.snake[i];
      const t = i / this.snake.length;
      const r = Math.round(0 + t * 0);
      const g = Math.round(255 - t * 155);
      const b = Math.round(255 - t * 100);
      const color = `rgb(${r},${g},${b})`;

      const x = s.x * cs + pad;
      const y = s.y * cs + pad;
      const size = cs - pad * 2;

      ctx.shadowColor = '#0ff';
      ctx.shadowBlur = i === 0 ? 12 : 6;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, y, size, size, 4);
      ctx.fill();

      // Head eyes
      if (i === 0) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#0a0a1a';
        const eyeSize = cs * 0.12;
        ctx.beginPath(); ctx.arc(x + cs * 0.3, y + cs * 0.35, eyeSize, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + cs * 0.7, y + cs * 0.35, eyeSize, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.shadowBlur = 0;
  }

  // Bind all event listeners
  bindEvents() {
    // Keyboard input
    document.addEventListener('keydown', e => {
      if (this.state === 'menu') {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          this.start(document.getElementById('difficulty').value);
        }
        return;
      }
      if (this.state === 'gameover') {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          this.start(this.difficulty);
        }
        return;
      }
      if (e.key === 'Escape' || e.key === ' ') {
        e.preventDefault();
        this.togglePause();
        return;
      }
      switch (e.key) {
        case 'ArrowUp':    case 'w': case 'W': e.preventDefault(); this.setDirection(0, -1); break;
        case 'ArrowDown':  case 's': case 'S': e.preventDefault(); this.setDirection(0, 1);  break;
        case 'ArrowLeft':  case 'a': case 'A': e.preventDefault(); this.setDirection(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': e.preventDefault(); this.setDirection(1, 0);  break;
      }
    });

    // Swipe gestures
    this.canvas.addEventListener('touchstart', e => {
      this.touchStartX = e.touches[0].clientX;
      this.touchStartY = e.touches[0].clientY;
    }, { passive: true });

    this.canvas.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - this.touchStartX;
      const dy = e.changedTouches[0].clientY - this.touchStartY;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);
      if (Math.max(absDx, absDy) < 20) return;
      if (absDx > absDy) {
        this.setDirection(dx > 0 ? 1 : -1, 0);
      } else {
        this.setDirection(0, dy > 0 ? 1 : -1);
      }
    }, { passive: true });

    // D-pad buttons
    document.querySelector('#dpad .up').addEventListener('click',    () => this.setDirection(0, -1));
    document.querySelector('#dpad .down').addEventListener('click',  () => this.setDirection(0, 1));
    document.querySelector('#dpad .left').addEventListener('click',  () => this.setDirection(-1, 0));
    document.querySelector('#dpad .right').addEventListener('click', () => this.setDirection(1, 0));

    // Mute toggle
    document.getElementById('mute-btn').addEventListener('click', () => {
      const muted = this.audio.toggleMute();
      document.getElementById('mute-btn').textContent = muted ? '\uD83D\uDD07' : '\uD83D\uDD0A';
      document.getElementById('mute-btn').setAttribute('aria-label', muted ? 'Unmute' : 'Mute');
    });

    // Start and restart buttons
    document.getElementById('start-btn').addEventListener('click', () => {
      this.start(document.getElementById('difficulty').value);
    });
    document.getElementById('restart-btn').addEventListener('click', () => {
      this.start(this.difficulty);
    });

    // Resize handling
    window.addEventListener('resize', () => {
      this.setupCanvas();
      if (this.state === 'menu' || this.state === 'gameover') this.render();
    });

    // Show D-pad on touch devices
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
      document.getElementById('dpad').style.display = 'flex';
    }
  }
}

// Initialize game
const game = new SnakeGame();
</script>
